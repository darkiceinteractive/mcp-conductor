<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200" role="img" aria-label="MCP Conductor component map">
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; font-size: 13px; fill: #1a1a1a; }
      .box { rx: 6; ry: 6; fill: #f0f4ff; stroke: #4a6fa5; stroke-width: 1.5; }
      .arrow { stroke: #4a6fa5; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .label { font-size: 11px; fill: #555; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a6fa5"/>
    </marker>
  </defs>

  <!-- Claude box -->
  <rect class="box" x="10" y="70" width="100" height="60"/>
  <text x="60" y="96" text-anchor="middle" font-weight="600">Claude</text>
  <text class="label" x="60" y="114" text-anchor="middle">LLM client</text>

  <!-- arrow Claude → Bridge -->
  <line class="arrow" x1="110" y1="100" x2="160" y2="100"/>

  <!-- Bridge box -->
  <rect class="box" x="160" y="70" width="100" height="60"/>
  <text x="210" y="96" text-anchor="middle" font-weight="600">Bridge</text>
  <text class="label" x="210" y="114" text-anchor="middle">HTTP :3001</text>

  <!-- arrow Bridge → Conductor -->
  <line class="arrow" x1="260" y1="100" x2="310" y2="100"/>

  <!-- Conductor box -->
  <rect class="box" x="310" y="70" width="100" height="60"/>
  <text x="360" y="96" text-anchor="middle" font-weight="600">Conductor</text>
  <text class="label" x="360" y="114" text-anchor="middle">Orchestrator</text>

  <!-- arrow Conductor → Deno -->
  <line class="arrow" x1="410" y1="100" x2="460" y2="100"/>

  <!-- Deno box -->
  <rect class="box" x="460" y="70" width="50" height="60"/>
  <text x="485" y="96" text-anchor="middle" font-weight="600">Deno</text>
  <text class="label" x="485" y="114" text-anchor="middle">Sandbox</text>
</svg>
