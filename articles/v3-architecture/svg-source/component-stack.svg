<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480" role="img" aria-label="MCP Conductor v3 component stack">
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; font-size: 12px; fill: #1a1a1a; }
      .layer { rx: 6; ry: 6; fill: #f0f4ff; stroke: #4a6fa5; stroke-width: 1.5; }
      .layer-dark { rx: 6; ry: 6; fill: #dde8ff; stroke: #3a5a99; stroke-width: 1.5; }
      .layer-ext { rx: 6; ry: 6; fill: #f5fff0; stroke: #4a8a4a; stroke-width: 1.5; }
      .layer-obs { rx: 6; ry: 6; fill: #fff8e8; stroke: #a07020; stroke-width: 1.5; }
      .arrow { stroke: #4a6fa5; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .arrow-rev { stroke: #4a6fa5; stroke-width: 1.2; stroke-dasharray: 5,3; fill: none; marker-end: url(#arr-rev); }
      .label-sm { font-size: 10px; fill: #555; }
      .title { font-size: 13px; font-weight: 600; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a6fa5" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Claude (top) -->
  <rect class="layer-dark" x="160" y="10" width="240" height="46"/>
  <text class="title" x="280" y="30" text-anchor="middle">Claude / Claude Code Agent</text>
  <text class="label-sm" x="280" y="48" text-anchor="middle">LLM client — MCP protocol (stdio / HTTP)</text>

  <!-- arrow down to MCPExecutorServer -->
  <line class="arrow" x1="280" y1="56" x2="280" y2="80"/>
  <text class="label-sm" x="288" y="72" fill="#4a6fa5">execute_code</text>

  <!-- MCPExecutorServer -->
  <rect class="layer" x="60" y="82" width="440" height="52"/>
  <text class="title" x="280" y="104" text-anchor="middle">MCPExecutorServer</text>
  <text class="label-sm" x="280" y="122" text-anchor="middle">Tool Registry (Ph1)  ·  Passthrough Registrar (X1)  ·  Lifecycle Tools (X2)</text>

  <!-- arrow down -->
  <line class="arrow" x1="280" y1="134" x2="280" y2="154"/>

  <!-- Skills Engine -->
  <rect class="layer" x="100" y="156" width="360" height="52"/>
  <text class="title" x="280" y="176" text-anchor="middle">Skills Engine / Sandbox (Phase 5)</text>
  <text class="label-sm" x="280" y="194" text-anchor="middle">mcp.callTool  ·  mcp.compact  ·  mcp.summarize  ·  mcp.findTool  ·  mcp.budget</text>

  <!-- arrow down -->
  <line class="arrow" x1="280" y1="208" x2="280" y2="228"/>

  <!-- Cache Layer -->
  <rect class="layer" x="100" y="230" width="360" height="40"/>
  <text class="title" x="280" y="250" text-anchor="middle">Cache Layer (Phase 2)</text>
  <text class="label-sm" x="280" y="264" text-anchor="middle">LRU + TTL  ·  disk persistence  ·  delta encoding</text>

  <!-- cache hit dashed arrow back up on right side -->
  <path class="arrow-rev" d="M462,250 C500,250 500,182 462,182"/>
  <text class="label-sm" x="503" y="218" fill="#4a6fa5">cache</text>
  <text class="label-sm" x="506" y="230" fill="#4a6fa5">hit</text>

  <!-- arrow down -->
  <line class="arrow" x1="280" y1="270" x2="280" y2="290"/>

  <!-- Reliability Gateway -->
  <rect class="layer" x="100" y="292" width="360" height="40"/>
  <text class="title" x="280" y="312" text-anchor="middle">Reliability Gateway (Phase 3)</text>
  <text class="label-sm" x="280" y="326" text-anchor="middle">withTimeout  →  withRetry  →  circuitBreaker</text>

  <!-- arrow down -->
  <line class="arrow" x1="280" y1="332" x2="280" y2="352"/>

  <!-- Connection Pool -->
  <rect class="layer" x="100" y="354" width="360" height="40"/>
  <text class="title" x="280" y="374" text-anchor="middle">Connection Pool + Warm Sandbox Pool (Phase 4)</text>
  <text class="label-sm" x="280" y="388" text-anchor="middle">persistent stdio  ·  pre-warmed Deno workers  ·  &lt;10ms warm calls</text>

  <!-- arrow down -->
  <line class="arrow" x1="280" y1="394" x2="280" y2="414"/>

  <!-- Backend MCPs -->
  <rect class="layer-ext" x="60" y="416" width="440" height="40"/>
  <text class="title" x="280" y="436" text-anchor="middle">Backend MCP Servers</text>
  <text class="label-sm" x="280" y="450" text-anchor="middle">github  ·  gdrive  ·  salesforce  ·  slack  ·  notion  ·  linear  ·  filesystem  ·  …</text>

  <!-- Observability side panel right -->
  <rect class="layer-obs" x="490" y="82" width="62" height="212"/>
  <text class="title" x="521" y="102" text-anchor="middle" font-size="11">Observ-</text>
  <text class="title" x="521" y="116" text-anchor="middle" font-size="11">ability</text>
  <text class="label-sm" x="521" y="133" text-anchor="middle">Phase 7</text>
  <text class="label-sm" x="521" y="150" text-anchor="middle">Cost</text>
  <text class="label-sm" x="521" y="163" text-anchor="middle">Predictor</text>
  <text class="label-sm" x="521" y="180" text-anchor="middle">Hot-path</text>
  <text class="label-sm" x="521" y="193" text-anchor="middle">Profiler</text>
  <text class="label-sm" x="521" y="210" text-anchor="middle">B13 Token</text>
  <text class="label-sm" x="521" y="223" text-anchor="middle">Reporter</text>
  <text class="label-sm" x="521" y="240" text-anchor="middle">Replay</text>
  <text class="label-sm" x="521" y="253" text-anchor="middle">Recorder</text>
  <text class="label-sm" x="521" y="270" text-anchor="middle">Anomaly</text>
  <text class="label-sm" x="521" y="283" text-anchor="middle">Detector</text>

  <!-- PII + Daemon side panel left -->
  <rect class="layer-obs" x="8" y="82" width="48" height="212"/>
  <text class="title" x="32" y="102" text-anchor="middle" font-size="11">PII</text>
  <text class="label-sm" x="32" y="118" text-anchor="middle">X4</text>
  <text class="label-sm" x="32" y="135" text-anchor="middle">email</text>
  <text class="label-sm" x="32" y="148" text-anchor="middle">phone</text>
  <text class="label-sm" x="32" y="161" text-anchor="middle">SSN</text>
  <text class="label-sm" x="32" y="178" text-anchor="middle">Daemon</text>
  <text class="label-sm" x="32" y="193" text-anchor="middle">Phase 6</text>
  <text class="label-sm" x="32" y="210" text-anchor="middle">Unix</text>
  <text class="label-sm" x="32" y="223" text-anchor="middle">socket</text>
  <text class="label-sm" x="32" y="240" text-anchor="middle">SharedKV</text>
  <text class="label-sm" x="32" y="257" text-anchor="middle">Shared</text>
  <text class="label-sm" x="32" y="270" text-anchor="middle">Lock</text>
  <text class="label-sm" x="32" y="283" text-anchor="middle">multi-agent</text>
</svg>
