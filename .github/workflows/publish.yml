name: publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Stamp build number
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD=${{ github.run_number }}
          cat > src/version.ts << EOF
          export const VERSION = '${VERSION}';
          export const BUILD_NUMBER = ${BUILD};
          export const BUILD_STRING = '${VERSION} (build ${BUILD})';
          EOF

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run
        env:
          DENO_AVAILABLE: true

      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Match in order. The catch-all `*-*` arm before `*)` ensures
          # any *unknown* prerelease label (canary, pre, dev, snapshot,
          # next, even typos like aplha) routes to a non-`latest` dist-tag
          # so we never silently ship an unstable build to default
          # `npm install` consumers.
          case "$VERSION" in
            *-alpha*) TAG=alpha ;;
            *-beta*)  TAG=beta ;;
            *-rc*)    TAG=next ;;
            *-*)      TAG=next ;;
            *)        TAG=latest ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Publishing $VERSION under dist-tag $TAG"

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.dist_tag.outputs.prerelease == 'true' }}
          body: |
            ## Install

            ```bash
            npx -y @darkiceinteractive/mcp-conductor@${{ steps.dist_tag.outputs.tag }}
            ```

            Build: ${{ github.run_number }}
